<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filament Hub - Material Design</title>
    <!-- Firebase SDKs (v8 compat für einfache Einbindung) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <!-- Chart.js für die Diagramme -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #f8f9fa;
            --surface: #ffffff;
            --border-light: #f1f3f4;
            --border-dark: #dadce0;
            --text-main: #202124;
            --text-muted: #5f6368;
            --primary: #1a73e8;
            --primary-hover: #174ea6;
            --dark: #202124;
            --danger: #ea4335;
            --warning: #fbbc04;
            --success: #34a853;
            --radius-sm: 4px;
            --radius-md: 12px;
            --radius-pill: 24px;
            --shadow-1: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
            --shadow-2: 0 1px 2px 0 rgba(60,64,67,0.3), 0 2px 6px 2px rgba(60,64,67,0.15);
            --shadow-3: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
        }
        
        .preview-banner { 
            display: none; 
            background: rgba(255, 251, 235, 0.9); 
            backdrop-filter: blur(8px);
            color: var(--warning); 
            text-align: center; 
            padding: 12px; 
            cursor: pointer; 
            font-weight: 500; 
            font-size: 14px;
            border-bottom: 1px solid #fce8e6;
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .is-preview .preview-banner { display: block; }
        
        .container { max-width: 1040px; margin: 60px auto; padding: 0 24px; }
        
        h1 { 
            text-align: center; 
            font-weight: 400; 
            letter-spacing: 0;
            font-size: 2.75rem;
            margin-bottom: 48px;
            color: var(--text-main);
        }

        /* Logo & Header */
        .site-header { display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; align-items: center; gap: 24px; margin-bottom: 48px; }
        .site-header h1 { margin: 0; }
        
        .logo-container {
            position: relative; width: 96px; height: 96px; display: flex; align-items: center; justify-content: center;
            background: var(--surface); border-radius: 50%;
            border: none;
            box-shadow: inset 0 0 0 14px var(--primary), inset 0 0 0 18px var(--border-light), var(--shadow-2);
            transform: rotate(-15deg); transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); cursor: default;
            z-index: 10;
        }
.logo-container:hover { transform: rotate(345deg) scale(1.1); }
        
        .logo-container::before {
            content: ''; position: absolute; width: 70px; height: 14px; background: var(--primary);
            top: 0; left: 50%; border-radius: 0 7px 7px 0; z-index: -1;
        }
        
        .logo-text {
            font-size: 34px; font-weight: 800; letter-spacing: -2px;
            display: flex; transform: rotate(15deg); transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
.logo-container:hover .logo-text { transform: rotate(-345deg); }
        
        .logo-f { color: var(--dark); }
        .logo-h { color: var(--primary); }
        
        h3 { font-weight: 500; font-size: 1.25rem; letter-spacing: 0; margin-top: 0; border-bottom: 1px solid var(--border-light); padding-bottom: 16px; margin-bottom: 24px; color: var(--text-main);}
        
        .section { 
            background: var(--surface);
            border: none;
            border-radius: var(--radius-md);
            padding: 32px; 
            margin-bottom: 32px; 
            box-shadow: var(--shadow-1);
            transition: var(--transition);
        }
        .section:hover { box-shadow: var(--shadow-2); }
        
        .admin-only { display: block; }
        .is-visitor .admin-only { display: none !important; }
        .config-area { background: var(--bg-color); }

        /* Dropdown Settings Menu */
        .settings-summary {
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            font-size: 1.15rem;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
            transition: var(--transition);
        }
        .settings-summary::-webkit-details-marker { display: none; }
        .settings-summary:hover { color: var(--primary); }
        .settings-arrow { transition: transform 0.3s; font-size: 0.8rem; opacity: 0.5; }
        details[open] .settings-arrow { transform: rotate(180deg); }

        /* Statistik Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; margin-bottom: 32px; }
        .chart-container { 
            background: var(--surface); 
            border: none; 
            border-radius: var(--radius-md);
            padding: 24px; 
            box-shadow: var(--shadow-1);
            min-height: 250px;
            transition: var(--transition);
        }
        .chart-container:hover { box-shadow: var(--shadow-2); }

        /* Form & Inputs */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
        .filament-form { display: grid; grid-template-columns: 1.1fr 1.1fr 1.8fr 1fr; gap: 16px; align-items: center; }
        .filament-form .full-width { grid-column: 1 / -1; }
        .color-picker-wrapper { display: flex; gap: 12px; align-items: center; width: 100%; }
        .color-picker-wrapper input[type="color"] { width: 44px; height: 44px; min-width: 44px; padding: 2px; flex-shrink: 0; }
        .color-picker-wrapper input[type="text"] { width: 100%; height: 44px; }
        .filament-form input[type="number"], .filament-form select, .filament-form input[type="text"] { height: 44px; }
        
        input, select, button { 
            padding: 10px 16px; 
            background: var(--surface);
            border: 1px solid var(--border-dark); 
            border-radius: var(--radius-sm);
            font-size: 15px; 
            font-family: inherit;
            color: var(--text-main);
            outline: none;
            box-sizing: border-box;
            transition: var(--transition);
        }
        input:focus, select:focus { border-color: var(--primary); box-shadow: inset 0 0 0 1px var(--primary); background-color: var(--surface); }
        input:hover, select:hover { border-color: var(--text-muted); }

        button { font-weight: 500; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; text-transform: uppercase; letter-spacing: 0.5px; border-radius: var(--radius-pill); border: none; box-shadow: var(--shadow-1); }
        button:active { box-shadow: var(--shadow-1); transform: translateY(1px); }
        button:hover { box-shadow: var(--shadow-2); }
        
        .btn-primary { background: var(--primary); color: #ffffff; }
        .btn-primary:hover { background: var(--primary-hover); color: #ffffff; }
        .btn-success { background: var(--surface); color: var(--success); }
        .btn-success:hover { background: #f6fbf8; }
        .btn-danger { background: var(--surface); color: var(--danger); }
        .btn-danger:hover { background: #fce8e6; }
        .btn-warning { background: var(--surface); color: #ea8600; }
        .btn-warning:hover { background: #fef7e0; }

        /* Tabelle */
        .table-wrapper { overflow-x: auto; border: none; border-radius: var(--radius-md); box-shadow: var(--shadow-1); background: var(--surface); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { text-align: left; padding: 14px 20px; border-bottom: 2px solid var(--border-dark); background: var(--surface); color: var(--text-muted); font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; }
        td { padding: 16px 20px; border-bottom: 1px solid var(--border-light); vertical-align: middle; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        
        th:nth-child(1), td:nth-child(1) { width: 38%; }
        th:nth-child(2), td:nth-child(2) { width: 12%; }
        th:nth-child(3), td:nth-child(3) { width: 20%; }
        th:nth-child(4), td:nth-child(4) { width: 30%; }
        
        tr { transition: filter 0.2s ease; }
        tr:hover { filter: brightness(0.85); }

        .color-preview { width: 16px; height: 16px; display: inline-block; vertical-align: middle; border: 1px solid rgba(0,0,0,0.1); border-radius: 50%; margin-right: 12px; }
        .stock-text { font-size: 14px; font-weight: 500; color: var(--text-main); }
        
        .action-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-start; }
        .btn-small { padding: 6px 12px; font-size: 13px; font-weight: 500; height: 32px; border-radius: var(--radius-sm); }

        .weight-wrapper { display: flex; flex-direction: column; justify-content: center; width: 100%; position: relative; }
        .slider-popup { display: none; position: absolute; top: 100%; left: 0; width: 100%; background: var(--surface); border: none; border-radius: var(--radius-sm); padding: 12px; box-sizing: border-box; box-shadow: var(--shadow-2); z-index: 10; margin-top: 4px; }
        .weight-wrapper:focus-within .slider-popup, .slider-popup:hover, .slider-popup:active { display: block; }
        
        input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; background: transparent; padding: 0; border: none; box-shadow: none; height: 16px !important; margin: 0; outline: none; }
        input[type="range"]:focus, input[type="range"]:hover { border: none; box-shadow: none; background: transparent; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: var(--border-dark); border-radius: 2px; }
        input[type="range"]::-moz-range-track { width: 100%; height: 4px; background: var(--border-dark); border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--primary); cursor: pointer; margin-top: -5px; transition: var(--transition); }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        input[type="range"]::-moz-range-thumb { height: 16px; width: 16px; border: none; border-radius: 50%; background: var(--primary); cursor: pointer; transition: var(--transition); }
        input[type="range"]::-moz-range-thumb:hover { transform: scale(1.2); }

        #sync-loader { display: none; text-align: center; background: var(--surface); border: none; border-radius: var(--radius-md); padding: 12px; margin-bottom: 24px; font-weight: 500; font-size: 14px; color: var(--text-muted); box-shadow: var(--shadow-1); }
        
        .editing-mode { box-shadow: 0 0 0 2px var(--warning), var(--shadow-2); background: #fff8e1; }

        input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); border-radius: 4px; cursor: pointer; }
        label { font-size: 14px; font-weight: 500; color: var(--text-main); cursor: pointer; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        #sync-loader.spinning::before { content: ''; display: inline-block; width: 14px; height: 14px; border: 2px solid var(--text-muted); border-top-color: transparent; border-radius: 50%; margin-right: 8px; vertical-align: middle; animation: spin 0.8s linear infinite; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .section { animation: fadeIn 0.4s ease-out forwards; }
        tr.new-row { animation: fadeIn 0.3s ease-out forwards; }
        
        .spool-icon { transition: var(--transition); flex-shrink: 0; }
        tr:hover .spool-icon { transform: scale(1.05); }

        /* Spulen-Ansicht (Grid & Kreis-Design) */
        .spool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; justify-items: center; margin-top: 16px; }
        .spool-item { position: relative; background: var(--surface); border: none; border-radius: var(--radius-md); padding: 24px 16px; width: 100%; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; box-shadow: var(--shadow-1); transition: var(--transition); }
        .spool-item:hover { box-shadow: var(--shadow-2); transform: translateY(-4px); }
        
        .spool-circle-container { position: relative; width: 220px; height: 220px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
        .spool-progress { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
        
        .spool-visual { 
            width: 192px; height: 192px; border-radius: 50%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; padding: 16px; box-sizing: border-box;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.15), 0 2px 6px rgba(0,0,0,0.05);
            z-index: 2;
        }
        
        .spool-brand { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.85; margin-bottom: 4px; }
        .spool-color { font-size: 14px; font-weight: 600; line-height: 1.2; margin-bottom: 6px; }
        .spool-material { font-size: 20px; font-weight: 800; letter-spacing: 0.02em; margin-bottom: 8px; }
        .spool-weight { font-size: 24px; font-weight: 900; background: rgba(255,255,255,0.2); padding: 2px 10px; border-radius: 12px; }
        
        .spool-actions { position: absolute; top: 12px; right: 12px; display: flex; gap: 8px; z-index: 10; }
        .spool-action-btn { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--surface); border: none; box-shadow: var(--shadow-1); color: var(--text-muted); cursor: pointer; transition: var(--transition); padding: 0; }
        .spool-action-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-2); }
        .spool-action-btn.edit:hover { color: var(--primary); border-color: var(--primary); }
        .spool-action-btn.delete:hover { color: var(--danger); border-color: var(--danger); }
    </style>
</head>
<body id="appBody">

    <div class="preview-banner" onclick="exitPreview()">VORSCHAU-MODUS AKTIV - KLICK ZUM BEENDEN</div>

    <div class="container">
        <div class="site-header">
            <div class="logo-container">
                <div class="logo-text">
                    <span class="logo-f">F</span><span class="logo-h">H</span>
                </div>
            </div>
            <h1><span class="logo-f">F</span>ilament <span class="logo-h">H</span>ub</h1>
        </div>

        <div class="section admin-only" id="formSection">
            <h3 id="formTitle">Neuer Eintrag</h3>
            <form id="filamentForm" class="filament-form">
                <select id="brandSelect" onchange="checkNewBrand(this)" required>
                    <option value="" disabled selected>HERSTELLER...</option>
                    <option value="Bambu Lab">Bambu Lab</option>
                    <option value="Prusament">Prusament</option>
                    <option value="Sunlu">Sunlu</option>
                    <option value="ADD_NEW">+ NEU...</option>
                </select>
                <select id="material" required>
                    <option value="PLA">PLA</option><option value="PETG">PETG</option><option value="ABS">ABS</option><option value="TPU">TPU</option><option value="ASA">ASA</option>
                </select>
                <div class="color-picker-wrapper">
                    <input type="color" id="colorHex" value="#1a73e8" style="cursor:pointer;">
                    <input type="text" id="colorName" placeholder="FARBE" required>
                </div>
                <div class="weight-wrapper">
                    <input type="number" id="weight" placeholder="GEWICHT (g)" required min="0">
                    <div class="slider-popup">
                        <input type="range" id="weightSlider" min="0" max="1000" step="10" value="1000" title="Gewicht schnell auswählen">
                    </div>
                </div>
                
                <!-- Buttons Container -->
                <div class="full-width" style="display:flex; gap:15px;">
                    <button type="submit" id="submitBtn" class="btn-primary" style="flex:1; padding:18px; font-size:18px;">Speichern</button>
                    <button type="button" id="cancelBtn" onclick="cancelEdit()" style="display:none; padding:18px; font-size:18px; flex:0.5;">Abbrechen</button>
                </div>
            </form>
        </div>

        <div class="section">
            <h3>Bestandsliste</h3>
            <div id="spoolContainer" class="spool-grid"></div>
        </div>

        <!-- DIAGRAMME -->
        <div class="stats-grid">
            <div class="chart-container">
                <h4 style="margin:0 0 10px 0; text-transform:uppercase;">Material-Mix</h4>
                <canvas id="materialChart"></canvas>
            </div>
            <div class="chart-container">
                <h4 style="margin:0 0 10px 0; text-transform:uppercase;">Bestand nach Farben (g)</h4>
                <canvas id="colorChart"></canvas>
            </div>
        </div>

        <div id="sync-loader">Synchronisiere...</div>

        <details class="section config-area admin-only" style="margin-bottom:40px;">
            <summary class="settings-summary">
                <span style="display: flex; align-items: center; gap: 10px;">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Einstellungen (Cloud & Sharing)
                </span>
                <span class="settings-arrow">▼</span>
            </summary>
            <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border-light);">
                <div class="grid">
                    <button class="btn-primary" onclick="fetchFromCloud()">Von Firebase laden</button>
                    <button class="btn-success" id="btnSync" onclick="syncToCloud()">In Firebase speichern</button>
                </div>
                <div style="margin-top:20px; font-weight: 900;">
                    <input type="checkbox" id="visitorToggle" onchange="toggleVisitorView()" style="width:20px; height:20px; vertical-align: middle; cursor:pointer; box-shadow:none;"> 
                    <label for="visitorToggle" style="cursor:pointer; text-transform:uppercase;">Vorschau (Nur-Lese-Modus)</label>
                </div>
            </div>
        </details>
    </div>

    <script>
        let filaments = JSON.parse(localStorage.getItem('hub_data')) || [];
        let customBrands = JSON.parse(localStorage.getItem('hub_brands')) || [];
        let materialChart, colorChart;
        let editingId = null; // Speichert die ID des zu bearbeitenden Eintrags

        // --- FIREBASE KONFIGURATION ---
        // TODO: Ersetze diese Werte mit deinen echten Firebase-Daten!
        const firebaseConfig = {
            apiKey: "AIzaSyArqjd50TXKGAhqyvohi_ImYvqE4NdTbJM",
            authDomain: "filamenthub-2127e.firebaseapp.com",
            projectId: "filamenthub-2127e",
            storageBucket: "filamenthub-2127e.firebasestorage.app",
            messagingSenderId: "596290050834",
            appId: "1:596290050834:web:b467987c9f14eba5fef1cb",
            measurementId: "G-M8J66DJZK0"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const docRef = db.collection("appData").doc("filamentInventory");

        function toggleVisitorView() {
            if(document.getElementById('visitorToggle').checked) {
                document.body.classList.add('is-visitor', 'is-preview');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else { exitPreview(); }
        }

        function exitPreview() {
            document.body.classList.remove('is-visitor', 'is-preview');
            document.getElementById('visitorToggle').checked = false;
        }

        function checkNewBrand(select) {
            if (select.value === 'ADD_NEW') {
                const newBrand = prompt("Name des neuen Herstellers:");
                if (newBrand) {
                    customBrands.push(newBrand);
                    localStorage.setItem('hub_brands', JSON.stringify(customBrands));
                    renderBrandOptions();
                    select.value = newBrand;
                } else { select.value = ""; }
            }
        }

        function renderBrandOptions() {
            const select = document.getElementById('brandSelect');
            const currentVal = select.value;
            const baseBrands = ["Bambu Lab", "Prusament", "Extrudr", "Sunlu", "Esun"];
            const allBrands = [...new Set([...baseBrands, ...customBrands])].sort();
            
            select.innerHTML = '<option value="" disabled selected>HERSTELLER...</option>';
            allBrands.forEach(b => { select.innerHTML += `<option value="${b}">${b.toUpperCase()}</option>`; });
            select.innerHTML += '<option value="ADD_NEW">+ NEU...</option>';
            if(currentVal && currentVal !== "ADD_NEW") select.value = currentVal;
        }

        async function fetchFromCloud() {
            const loader = document.getElementById('sync-loader');
            loader.classList.add('spinning');
            loader.style.display = 'block';
            try {
                const docSnap = await docRef.get();
                if (docSnap.exists) {
                    const data = docSnap.data();
                    if(data.filaments) filaments = data.filaments;
                    if(data.customBrands) {
                        customBrands = data.customBrands;
                        localStorage.setItem('hub_brands', JSON.stringify(customBrands));
                        renderBrandOptions();
                    }
                    render();
                }
                loader.style.animation = 'successBounce 0.6s ease-out';
            } catch (e) { 
                console.error(e);
                loader.style.background = 'var(--danger)';
                loader.style.color = '#fff';
                alert("Fehler beim Laden von Firebase. Config oder Firestore-Regeln prüfen!"); 
            }
            setTimeout(() => {
                loader.classList.remove('spinning');
                loader.style.display = 'none';
                loader.style.animation = '';
                loader.style.background = 'var(--surface)';
                loader.style.color = 'var(--text-muted)';
            }, 600);
        }

        async function syncToCloud() {
            if(document.body.classList.contains('is-visitor')) {
                alert("Im Vorschau-Modus kannst du keine Daten speichern.");
                return;
            }
            const loader = document.getElementById('sync-loader');
            loader.classList.add('spinning');
            loader.style.display = 'block';
            try {
                await docRef.set({
                    filaments: filaments,
                    customBrands: customBrands
                });
                loader.style.animation = 'successBounce 0.6s ease-out';
            } catch (e) { 
                console.error(e);
                loader.style.background = 'var(--danger)';
                loader.style.color = '#fff';
                alert("Fehler beim Speichern in Firebase! Hast du Schreibrechte in den Firestore-Regeln?"); 
            }
            setTimeout(() => {
                loader.classList.remove('spinning');
                loader.style.display = 'none';
                loader.style.animation = '';
                loader.style.background = 'var(--surface)';
                loader.style.color = 'var(--text-muted)';
            }, 600);
        }

    // --- FARBERKENNUNG LOGIK ---
    const basicColors = [
        { name: "Schwarz", hex: "#000000" }, { name: "Weiß", hex: "#ffffff" }, { name: "Grau", hex: "#808080" }, { name: "Silber", hex: "#c0c0c0" },
        { name: "Rot", hex: "#ff0000" }, { name: "Grün", hex: "#00ff00" }, { name: "Blau", hex: "#0000ff" },
        { name: "Gelb", hex: "#ffff00" }, { name: "Cyan", hex: "#00ffff" }, { name: "Magenta", hex: "#ff00ff" },
        { name: "Orange", hex: "#ffa500" }, { name: "Braun", hex: "#a52a2a" }, { name: "Rosa", hex: "#ffc0cb" },
        { name: "Violett", hex: "#800080" }, { name: "Gold", hex: "#ffd700" }, { name: "Beige", hex: "#f5f5dc" },
        { name: "Hellblau", hex: "#add8e6" }, { name: "Dunkelblau", hex: "#00008b" }, { name: "Hellgrün", hex: "#90ee90" },
        { name: "Dunkelgrün", hex: "#006400" }, { name: "Türkis", hex: "#40e0d0" }, { name: "Bordeaux", hex: "#800000" },
        { name: "Olivgrün", hex: "#808000" }, { name: "Lachs", hex: "#fa8072" }, { name: "Koralle", hex: "#ff7f50" },
        { name: "Kupfer", hex: "#b87333" }, { name: "Bronze", hex: "#cd7f32" }, { name: "Natur / Transparent", hex: "#e8e6e3" }
    ];

    function hexToRgb(hex) {
        let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
    }

    document.getElementById('colorHex').addEventListener('input', (e) => {
        const rgb = hexToRgb(e.target.value);
        if (!rgb) return;
        
        let minDistance = Infinity;
        let closestName = "";
        basicColors.forEach(color => {
            const cRgb = hexToRgb(color.hex);
            if(cRgb) {
                const distance = Math.pow(rgb.r - cRgb.r, 2) + Math.pow(rgb.g - cRgb.g, 2) + Math.pow(rgb.b - cRgb.b, 2);
                if (distance < minDistance) { minDistance = distance; closestName = color.name; }
            }
        });
        document.getElementById('colorName').value = closestName;
    });

    // --- GEWICHT SLIDER SYNC ---
    const weightInput = document.getElementById('weight');
    const weightSlider = document.getElementById('weightSlider');
    weightInput.addEventListener('input', (e) => { weightSlider.value = e.target.value; });
    weightSlider.addEventListener('input', (e) => { weightInput.value = e.target.value; });

        // --- BEARBEITEN LOGIK ---
        function editItem(id) {
            const item = filaments.find(f => f.id == id);
            if(!item) return;

            editingId = id;
            
            // Falls der Hersteller nicht im Dropdown ist, kurz hinzufügen
            const select = document.getElementById('brandSelect');
            let optionExists = Array.from(select.options).some(opt => opt.value === item.brand);
            if(!optionExists) {
                select.innerHTML = `<option value="${item.brand}">${item.brand.toUpperCase()}</option>` + select.innerHTML;
            }

            document.getElementById('brandSelect').value = item.brand;
            document.getElementById('material').value = item.material;
            document.getElementById('colorName').value = item.colorName;
            document.getElementById('colorHex').value = item.colorHex;
            document.getElementById('weight').value = item.weight;
            document.getElementById('weightSlider').value = item.weight;

            // UI anpassen mit Animation
            document.getElementById('formTitle').innerText = 'Eintrag bearbeiten';
            const formSection = document.getElementById('formSection');
            formSection.classList.add('editing-mode');
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerHTML = 'ÄNDERN';
            submitBtn.className = 'btn-warning';
            submitBtn.style.animation = 'addButtonPress 0.4s ease-out';
            
            document.getElementById('cancelBtn').style.display = 'block';
            document.getElementById('cancelBtn').style.animation = 'slideInRight 0.4s ease-out';

            // Highlight Filament-Rolle
            document.querySelectorAll('.spool-item').forEach(item => item.style.opacity = '0.4');
            const activeSpool = document.getElementById(`spool-${id}`);
            if(activeSpool) {
                activeSpool.style.opacity = '1';
                activeSpool.style.transform = 'scale(1.05)';
            }

            // Scroll hoch zum Formular
            window.scrollTo({ top: formSection.offsetTop - 20, behavior: 'smooth' });
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('filamentForm').reset();
            
            // UI zurücksetzen mit Animation
            const formSection = document.getElementById('formSection');
            formSection.style.animation = 'fadeInSlide 0.4s ease-out reverse';
            
            setTimeout(() => {
                document.getElementById('formTitle').innerText = 'Neuer Eintrag';
                formSection.classList.remove('editing-mode');
                formSection.style.animation = '';
                
                const submitBtn = document.getElementById('submitBtn');
                submitBtn.innerHTML = 'Speichern';
                submitBtn.className = 'btn-primary';
                submitBtn.style.animation = '';
                
                document.getElementById('cancelBtn').style.display = 'none';
                document.getElementById('cancelBtn').style.animation = '';

                // Highlight Filament-Rolle entfernen
                document.querySelectorAll('.spool-item').forEach(item => {
                    item.style.opacity = '1';
                    item.style.transform = '';
                });
            }, 200);
        }

        document.getElementById('filamentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.style.animation = 'addButtonPress 0.3s ease-out';
            
            if (editingId) {
                // Bestehenden Eintrag aktualisieren
                const index = filaments.findIndex(f => f.id == editingId);
                if (index !== -1) {
                    filaments[index] = {
                        ...filaments[index],
                        brand: document.getElementById('brandSelect').value,
                        material: document.getElementById('material').value,
                        colorName: document.getElementById('colorName').value,
                        colorHex: document.getElementById('colorHex').value,
                        weight: parseInt(document.getElementById('weight').value)
                    };
                }
                cancelEdit(); // Beendet den Modus
            } else {
                // Neuen Eintrag hinzufügen
                filaments.push({
                    id: Date.now(),
                    brand: document.getElementById('brandSelect').value,
                    material: document.getElementById('material').value,
                    colorName: document.getElementById('colorName').value,
                    colorHex: document.getElementById('colorHex').value,
                    weight: parseInt(document.getElementById('weight').value)
                });
                
                // Form Reset mit Animation
                e.target.style.animation = 'colorFlash 0.4s ease-out';
                setTimeout(() => {
                    e.target.reset();
                    e.target.style.animation = '';
                }, 200);
            }
            
            setTimeout(() => {
                submitBtn.style.animation = '';
                render();
            }, 150);
        });

        function useWeight(id) {
            const amount = prompt("Verbrauch (g):");
            if(amount) {
                const item = filaments.find(f => f.id == id);
                item.weight -= parseInt(amount);
                if(item.weight < 0) item.weight = 0;
                
                
                render();
            }
        }

        function deleteItem(id) {
            if(confirm("Eintrag wirklich löschen?")) {
                const spool = document.getElementById(`spool-${id}`);
                if(spool) {
                    spool.style.transform = 'scale(0.8)';
                    spool.style.opacity = '0';
                }
                
                setTimeout(() => {
                    filaments = filaments.filter(f => f.id != id);
                    if(editingId === id) cancelEdit(); // Falls man gerade bearbeitet
                    render();
                }, 200);
            }
        }

        function updateCharts() {
            const ctxMat = document.getElementById('materialChart').getContext('2d');
            const ctxCol = document.getElementById('colorChart').getContext('2d');

            const matCounts = {};
            const colWeights = {};
            const colHexMap = {};

            filaments.forEach(f => {
                matCounts[f.material] = (matCounts[f.material] || 0) + 1;
                colWeights[f.colorName] = (colWeights[f.colorName] || 0) + f.weight;
                colHexMap[f.colorName] = f.colorHex;
            });

            if(materialChart) materialChart.destroy();
            materialChart = new Chart(ctxMat, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(matCounts),
                    datasets: [{
                        data: Object.values(matCounts),
                    backgroundColor: ['#1a73e8', '#34a853', '#fbbc04', '#ea4335', '#8ab4f8'],
                    borderWidth: 2, borderColor: '#ffffff'
                    }]
                },
            options: { plugins: { legend: { position: 'bottom', labels: { font: { family: 'Inter, sans-serif' } } } }, animation: false }
            });

            if(colorChart) colorChart.destroy();
            colorChart = new Chart(ctxCol, {
                type: 'bar',
                data: {
                    labels: Object.keys(colWeights),
                    datasets: [{
                        label: 'Gramm',
                        data: Object.values(colWeights),
                        backgroundColor: Object.keys(colWeights).map(name => colHexMap[name]),
                    borderWidth: 1, borderColor: 'rgba(0,0,0,0.1)'
                    }]
                },
                options: { 
                    scales: { y: { beginAtZero: true, grid: { color: '#ddd' } } },
                    plugins: { legend: { display: false } },
                    animation: false 
                }
            });
        }

        function render() {
            localStorage.setItem('hub_data', JSON.stringify(filaments));
            const container = document.getElementById('spoolContainer');
            container.innerHTML = '';
            
            function getContrastColor(hex) {
                if (!hex) return '#171717';
                hex = hex.replace('#', '');
                if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
                const r = parseInt(hex.substr(0, 2), 16);
                const g = parseInt(hex.substr(2, 2), 16);
                const b = parseInt(hex.substr(4, 2), 16);
                const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
                return (yiq >= 128) ? '#171717' : '#ffffff';
            }
            
            filaments.forEach((f, idx) => {
                const fillLevel = Math.max(0, Math.min(f.weight / 1000, 1));
                const textColor = getContrastColor(f.colorHex);
                const radius = 104; // SVG radius
                const circumference = 2 * Math.PI * radius;
                const offset = circumference * (1 - fillLevel);

                const item = document.createElement('div');
                item.className = 'spool-item';
                item.id = `spool-${f.id}`;
                item.style.animationDelay = `${idx * 0.05}s`;
                item.innerHTML = `
                    <div class="spool-circle-container">
                        <svg class="spool-progress" width="220" height="220">
                            <circle cx="110" cy="110" r="${radius}" fill="none" stroke="var(--border-light)" stroke-width="6"/>
                            <circle cx="110" cy="110" r="${radius}" fill="none" stroke="${f.colorHex}" stroke-width="6" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
                        </svg>
                        <div class="spool-visual" style="background-color: ${f.colorHex}; color: ${textColor};">
                            <div class="spool-brand">${f.brand}</div>
                            <div class="spool-color">${f.colorName}</div>
                            <div class="spool-material">${f.material}</div>
                            <div class="spool-weight">${f.weight}g</div>
                        </div>
                    </div>
                    <div class="spool-actions admin-only">
                        <button class="spool-action-btn edit" onclick="editItem(${f.id})" title="Bearbeiten">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </button>
                        <button class="spool-action-btn delete" onclick="deleteItem(${f.id})" title="Löschen">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                    </div>
                `;
                container.appendChild(item);
            });
            updateCharts();
        }

        renderBrandOptions();
        render();
    </script>
</body>
</html>
